name: Agent 2 — Secrets accidentellement commités

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Historique complet pour scanner tous les commits

      - name: Scanner les secrets avec TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Alerter Discord si secrets détectés
        if: steps.trufflehog.outcome == 'failure'
        run: |
          COMMIT="${{ github.sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          AUTHOR="${{ github.actor }}"

          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_GITHUB }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"🚨 **SECRET DÉTECTÉ DANS LE CODE**\n> Un token, une clé API ou un mot de passe a été trouvé dans un commit.\n> **Commit :** \`${SHORT_SHA}\`\n> **Auteur :** ${AUTHOR}\n> **ACTION IMMÉDIATE :** Révoque la clé exposée maintenant, puis supprime-la du code.\n> Ne jamais attendre — une clé commitée est considérée comme compromise.\"
            }"

      - name: Confirmer Discord si aucun secret
        if: steps.trufflehog.outcome == 'success'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_GITHUB }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✅ **Scan secrets — Aucun secret exposé**\n> Aucune clé API ou token détecté dans ce commit.\"
            }"
